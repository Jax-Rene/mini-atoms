app = "mini-atoms"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_ADDR = ":8080"
  DATABASE_PATH = "/data/mini-atoms-gorm.db"
  APP_BASE_URL = "https://mini-atoms.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

  [[http_service.checks]]
    grace_period = "20s"
    interval = "20s"
    method = "GET"
    timeout = "5s"
    path = "/readyz"

[[mounts]]
  source = "mini_atoms_data"
  destination = "/data"
