<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2a46"/>
      <stop offset="52%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#131d33"/>
    </linearGradient>
    <radialGradient id="mainGlow" cx="44%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#32466f" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#0b111d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3b7bf"/>
      <stop offset="100%" stop-color="#989ca4"/>
    </linearGradient>
    <linearGradient id="subHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#fff"/>

  <g stroke="#fff" stroke-opacity=".9" stroke-width="2">
    <rect x="102" y="102" width="77" height="77" rx="2" fill="url(#sub)"/>
    <rect x="350" y="145" width="77" height="77" rx="2" fill="url(#sub)"/>
    <rect x="93" y="290" width="77" height="77" rx="2" fill="url(#sub)"/>
    <rect x="181" y="188" width="164" height="164" rx="2" fill="url(#main)"/>
  </g>

  <g fill="url(#subHighlight)">
    <rect x="103" y="103" width="75" height="28" rx="1"/>
    <rect x="351" y="146" width="75" height="28" rx="1"/>
    <rect x="94" y="291" width="75" height="28" rx="1"/>
  </g>
  <rect x="182" y="189" width="162" height="162" rx="1" fill="url(#mainGlow)"/>
</svg>
